<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f3e8ff, #e0f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 350px;
    }

    h2 {
      text-align: center;
      color: #6b21a8;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #9333ea;
      box-shadow: 0 0 5px rgba(147, 51, 234, 0.4);
    }

    .btn {
      margin-top: 20px;
      width: 100%;
      background: #9333ea;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #7e22ce;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login Form</h2>

    <form action="http://127.0.0.1:8082/login" method="post">
      <label for="username">User Name</label>
      <input type="text" id="username" name="username" placeholder="Enter your username">

      <label for="passwd">Password</label>
      <input type="password" id="passwd" name="passwd" placeholder="Enter your password">

      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob">

      <input type="submit" value="Login" class="btn">
    </form>

    <p class="note">Enter your login details to continue.</p>
  </div>

</body>
</html>
